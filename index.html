<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's Play Rock Paper Scissors!</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js"></script>
</head>
<body>
    <header>
        <h1>Let's Play Rock Paper Scissors!</h1>
        <h2>Best of 7 Series!</h2>
    </header>
    <main>
        <section class="scores__section"> 
            <div class="userScore__div">
                <h3>Your score:</h3>
                <p class="userScoreCount__div">0</p>
            </div>

            <div class="compScore__div">
                <h3>Computer Score:</h3>
                <p class="compScoreCount__div">0</p>
            </div>
        </section>

        <section class="choose__section">
            <button class="rock__button"><img src="images/theRock.png"></button>
            <button class="paper__button"><img src="images/DoodleBob.webp"></button>
            <button class="scissors__button"><img src="images/edScissorhands.png"></button>
        </section>

        <section class="moves__section">
            <h3>Moves Left:</h3>
            <p class="movesLeft__p">7</p>
        </section>
    </main>
</body>
</html>
